<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris with AI Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        .canvas-wrapper {
            position: relative;
        }
        #tetrisCanvas {
            border: 3px solid #4a9eff;
            border-radius: 10px;
            background: #0a0a15;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 180px;
        }
        .panel-box {
            background: rgba(74, 158, 255, 0.1);
            border: 2px solid #4a9eff;
            border-radius: 10px;
            padding: 15px;
        }
        .panel-box h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #scoreDisplay, #levelDisplay, #linesDisplay, #highScoreDisplay {
            font-size: 24px;
            text-align: center;
            color: #fff;
        }
        #nextCanvas {
            display: block;
            margin: 0 auto;
            background: #0a0a15;
            border-radius: 5px;
        }
        .controls {
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #4a9eff 0%, #2d7dd2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.4);
        }
        button.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }
        .key-info {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            text-align: left;
        }
        .key-info div {
            margin: 5px 0;
        }
        .key-label {
            display: inline-block;
            width: 80px;
            color: #4a9eff;
        }
        #effectLayer {
            position: absolute;
            pointer-events: none;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            <canvas id="effectLayer" width="300" height="600"></canvas>
        </div>
        <div class="side-panel">
            <div class="panel-box controls">
                <h3>操作モード</h3>
                <button id="playBtn">プレイモード</button>
                <button id="aiBtn">AI デモ</button>
            </div>
            <div class="panel-box">
                <h3>スコア</h3>
                <div id="scoreDisplay">0</div>
            </div>
            <div class="panel-box">
                <h3>レベル</h3>
                <div id="levelDisplay">1</div>
            </div>
            <div class="panel-box">
                <h3>ライン</h3>
                <div id="linesDisplay">0</div>
            </div>
            <div class="panel-box">
                <h3>ハイスコア</h3>
                <div id="highScoreDisplay">0</div>
            </div>
            <div class="panel-box">
                <h3>次のブロック</h3>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-box controls">
                <button id="pauseBtn">一時停止</button>
                <button id="resetBtn">リセット</button>
            </div>
            <div class="panel-box controls">
                <h3>操作説明</h3>
                <div class="key-info">
                    <div><span class="key-label">矢印キー:</span>移動・回転</div>
                    <div><span class="key-label">下:</span>高速落下</div>
                    <div><span class="key-label">Space:</span>即落下</div>
                    <div><span class="key-label">P:</span>一時停止</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // テトリミノ定義
        const PIECES = {
            I: { shape: [[1,1,1,1]], color: '#00ffff' },
            O: { shape: [[1,1],[1,1]], color: '#ffff00' },
            T: { shape: [[0,1,0],[1,1,1]], color: '#ff00ff' },
            S: { shape: [[0,1,1],[1,1,0]], color: '#00ff00' },
            Z: { shape: [[1,1,0],[0,1,1]], color: '#ff0000' },
            J: { shape: [[1,0,0],[1,1,1]], color: '#0000ff' },
            L: { shape: [[0,0,1],[1,1,1]], color: '#ff8800' }
        };

        const PIECE_KEYS = Object.keys(PIECES);

        // ゲーム設定
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // キャンバス
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const effectCanvas = document.getElementById('effectLayer');
        const effectCtx = effectCanvas.getContext('2d');

        // ゲーム状態
        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let highScore = localStorage.getItem('tetrisHighScore') || 0;
        let currentPiece = null;
        let nextPieceType = null;
        let gameOver = false;
        let paused = false;
        let aiMode = false;
        let dropInterval = 1000;
        let lastDrop = 0;
        let animationEffect = [];

        // スコア表示初期化
        document.getElementById('highScoreDisplay').textContent = highScore;

        // ボタン設定
        document.getElementById('playBtn').addEventListener('click', () => setMode(false));
        document.getElementById('aiBtn').addEventListener('click', () => setMode(true));
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        function setMode(isAI) {
            aiMode = isAI;
            document.getElementById('playBtn').classList.toggle('active', !isAI);
            document.getElementById('aiBtn').classList.toggle('active', isAI);
            // AI モード切り替え時にエフェクトをクリア
            animationEffect = [];
            resetGame();
        }

        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }

        function createPiece(type) {
            const piece = PIECES[type];
            return {
                shape: piece.shape.map(row => [...row]),
                color: piece.color,
                x: Math.floor((COLS - piece.shape[0].length) / 2),
                y: 0
            };
        }

        function getRandomPiece() {
            const type = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
            return createPiece(type);
        }

        function resetGame() {
            initBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            paused = false;
            dropInterval = 1000;
            animationEffect = [];
            currentPiece = getRandomPiece();
            nextPieceType = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
            lastDrop = performance.now();
            updateDisplay();
            draw();
        }

        function togglePause() {
            if (gameOver) return;
            
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '再開' : '一時停止';
        }

        // 衝突判定
        function canMove(piece, offsetX, offsetY, newShape = null) {
            const shape = newShape || piece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                        if (newY >= 0 && board[newY][newX]) return false;
                    }
                }
            }
            return true;
        }

        function rotate(piece) {
            const rotated = piece.shape[0].map((_, i) => 
                piece.shape.map(row => row[i]).reverse()
            );
            if (canMove(piece, 0, 0, rotated)) {
                piece.shape = rotated;
            } else if (canMove(piece, -1, 0, rotated)) {
                piece.x -= 1;
                piece.shape = rotated;
            } else if (canMove(piece, 1, 0, rotated)) {
                piece.x += 1;
                piece.shape = rotated;
            }
        }

        function lockPiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        if (boardY >= 0) {
                            board[boardY][currentPiece.x + x] = currentPiece.color;
                        } else {
                            gameOver = true;
                        }
                    }
                }
            }

            if (!gameOver) {
                clearLines();
                currentPiece = createPiece(nextPieceType);
                nextPieceType = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
                
                if (!canMove(currentPiece, 0, 0)) {
                    gameOver = true;
                }
            }

            draw();
        }

        // ライン消去とエフェクト
        function clearLines() {
            const linesToClear = [];
            
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    linesToClear.push(y);
                }
            }

            if (linesToClear.length > 0) {
                const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'];
                
                for (const y of linesToClear) {
                    animationEffect.push({
                        type: 'line-clear',
                        y,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1.0,
                        scale: 1.0
                    });

                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                }

                // スコア計算
                const lineScores = [0, 100, 300, 500, 800];
                score += lineScores[linesToClear.length] * level;
                lines += linesToClear.length;
                
                if (Math.floor(lines / 10) + 1 > level) {
                    level = Math.floor(lines / 10) + 1;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                }

                updateDisplay();
            }
        }

        // ゲームループ
        function gameLoop(timestamp) {
            if (!paused && !gameOver) {
                if (timestamp - lastDrop > dropInterval) {
                    if (aiMode) {
                        makeAIMove();
                    } else {
                        moveDown();
                    }
                    lastDrop = timestamp;
                }
            }

            draw();
            updateEffects();
            
            requestAnimationFrame(gameLoop);
        }

        // 移動処理
        function moveDown() {
            if (canMove(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        }

        function moveLeft() {
            if (canMove(currentPiece, -1, 0)) {
                currentPiece.x--;
            }
        }

        function moveRight() {
            if (canMove(currentPiece, 1, 0)) {
                currentPiece.x++;
            }
        }

        function hardDrop() {
            while (canMove(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            lockPiece();
            updateDisplay();
        }


        // エフェクト更新
        function updateEffects() {
            if (animationEffect.length > 0) {
                effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                
                const remainingEffects = [];
                
                for (const effect of animationEffect) {
                    effect.alpha -= 0.05;
                    effect.scale += 0.1;
                    
                    if (effect.type === 'line-clear') {
                        const y = effect.y * BLOCK_SIZE + 3;
                        
                        // グロー効果 - alpha が十分ある場合のみ描画
                        if (effect.alpha > 0) {
                            effectCtx.save();
                            effectCtx.globalAlpha = effect.alpha;
                            effectCtx.fillStyle = effect.color;
                            effectCtx.shadowColor = effect.color;
                            effectCtx.shadowBlur = 20 * effect.alpha;
                            
                            const rectWidth = COLS * BLOCK_SIZE / effect.scale;
                            const centerX = (COLS * BLOCK_SIZE - rectWidth) / 2;
                            effectCtx.fillRect(centerX, y, rectWidth, BLOCK_SIZE);
                            effectCtx.restore();

                            // 放射状エフェクト
                            effectCtx.save();
                            effectCtx.globalAlpha = effect.alpha * 0.5;
                            effectCtx.strokeStyle = effect.color;
                            effectCtx.lineWidth = 3;
                            
                            const centerX2 = COLS * BLOCK_SIZE / 2;
                            for (let i = 0; i < 8; i++) {
                                effectCtx.beginPath();
                                effectCtx.moveTo(centerX2, y + BLOCK_SIZE/2);
                                effectCtx.lineTo(
                                    centerX2 + Math.cos(i * Math.PI/4) * COLS * BLOCK_SIZE / 1.5,
                                    (y + BLOCK_SIZE/2) + Math.sin(i * Math.PI/4) * BLOCK_SIZE
                                );
                                effectCtx.stroke();
                            }
                            effectCtx.restore();
                        }
                    }

                    // alpha が十分大きい場合のみ保持
                    if (effect.alpha > 0.05) {
                        remainingEffects.push(effect);
                    } else if (effect.type === 'line-clear') {
                        // 最後にもう一度クリア描画して確実に消す
                        effectCtx.clearRect(
                            0, 
                            effect.y * BLOCK_SIZE, 
                            COLS * BLOCK_SIZE, 
                            BLOCK_SIZE
                        );
                    }
                }
                
                animationEffect = remainingEffects;
            }
        }

        // AI の評価関数
        function evaluateBoard(boardState) {
            let linesCleared = 0;
            let aggregateHeight = 0;
            let holes = 0;
            let bumpiness = 0;
            const heights = [];

            // 各列の高さを計算
            for (let x = 0; x < COLS; x++) {
                let height = 0;
                for (let y = 0; y < ROWS; y++) {
                    if (boardState[y][x] !== 0) {
                        height = ROWS - y;
                        break;
                    }
                }
                heights.push(height);
                aggregateHeight += height;

                // 穴の検出（下のブロックより上にある空洞）
                let hasBlock = false;
                for (let y = 0; y < ROWS; y++) {
                    if (boardState[y][x] !== 0) {
                        hasBlock = true;
                    } else if (hasBlock && height > 0) {
                        holes++;
                    }
                }
            }

            // 凹凸の計算
            for (let i = 0; i < heights.length - 1; i++) {
                bumpiness += Math.abs(heights[i] - heights[i + 1]);
            }

            // ライン消去の評価
            const completeLines = boardState.filter(row => row.every(cell => cell !== 0)).length;
            linesCleared = completeLines;

            // 評価関数（重み付き）
            const weights = {
                linesCleared: 0.76,
                aggregateHeight: -0.51,
                holes: -0.36,
                bumpiness: -0.18
            };

            return (weights.linesCleared * linesCleared +
                    weights.aggregateHeight * aggregateHeight +
                    weights.holes * holes +
                    weights.bumpiness * bumpiness);
        }

        // AI の移動判断
        function makeAIMove() {
            const bestMove = getBestMove();
            
            if (bestMove) {
                // 回転を適用
                for (let i = 0; i < bestMove.rotations; i++) {
                    rotate(currentPiece);
                }
                
                // 左右に移動
                while (currentPiece.x > bestMove.x) {
                    moveLeft();
                }
                while (currentPiece.x < bestMove.x) {
                    moveRight();
                }

                // 即落下
                hardDrop();
            } else {
                // ベストな動きがない場合は通常通り落下
                if (!canMove(currentPiece, 0, 1)) {
                    lockPiece();
                } else {
                    currentPiece.y++;
                }
            }
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let bestMove = null;

            // すべての回転を試す
            for (let r = 0; r < 4; r++) {
                const testPiece = JSON.parse(JSON.stringify(currentPiece));
                
                // 回転適用（深さコピー）
                for (let i = 0; i < r; i++) {
                    const rotated = testPiece.shape[0].map((_, i) => 
                        testPiece.shape.map(row => row[i]).reverse()
                    );
                    
                    if (canMove(testPiece, 0, 0, rotated)) {
                        testPiece.shape = rotated;
                    } else if (canMove(testPiece, -1, 0, rotated)) {
                        testPiece.x -= 1;
                        testPiece.shape = rotated;
                    } else if (canMove(testPiece, 1, 0, rotated)) {
                        testPiece.x += 1;
                        testPiece.shape = rotated;
                    } else {
                        break;
                    }
                }

                // この回転で左右のすべての位置を試す
                for (let x = -2; x <= COLS + 2; x++) {
                    const offsetX = x - testPiece.x;
                    
                    if (!canMove(testPiece, offsetX, 0)) continue;

                    // 落下位置まで移動
                    const testPiece2 = { ...testPiece, x: testPiece.x + offsetX };
                    while (canMove(testPiece2, 0, 1)) {
                        testPiece2.y++;
                    }

                    // 配置シミュレーション
                    const simBoard = board.map(row => [...row]);
                    let valid = true;
                    
                    for (let py = 0; py < testPiece2.shape.length; py++) {
                        for (let px = 0; px < testPiece2.shape[py].length; px++) {
                            if (testPiece2.shape[py][px]) {
                                const boardY = testPiece2.y + py;
                                if (boardY >= 0 && boardY < ROWS) {
                                    simBoard[boardY][testPiece2.x + px] = 1;
                                } else {
                                    valid = false;
                                }
                            }
                        }
                    }

                    if (!valid) continue;

                    const score = evaluateBoard(simBoard);
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = { x: testPiece2.x, rotations: r };
                    }
                }
            }

            return bestMove;
        }

        // 描画関数
        function draw() {
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, COLS * BLOCK_SIZE, ROWS * BLOCK_SIZE);

            // グリッド
            ctx.strokeStyle = 'rgba(74, 158, 255, 0.1)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, ROWS * BLOCK_SIZE);
                ctx.stroke();
            }
            
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(COLS * BLOCK_SIZE, y * BLOCK_SIZE);
                ctx.stroke();
            }

            // ボード上のブロック
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, board[y][x]);
                    }
                }
            }

            // 現在のパースを落下位置まで描画（ghost）
            let ghostY = currentPiece.y;
            while (canMove(currentPiece, 0, ghostY - currentPiece.y + 1)) {
                ghostY++;
            }

            ctx.globalAlpha = 0.3;
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        drawBlock(ctx, currentPiece.x + x, ghostY + y, currentPiece.color);
                    }
                }
            }
            ctx.globalAlpha = 1.0;

            // 現在のパース
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                    }
                }
            }

            // ゲームオーバー表示
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, ROWS * BLOCK_SIZE / 2 - 40, COLS * BLOCK_SIZE, 80);
                
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', COLS * BLOCK_SIZE / 2, ROWS * BLOCK_SIZE / 2 + 10);

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('tetrisHighScore', highScore);
                    document.getElementById('highScoreDisplay').textContent = highScore;
                }
            }

            // プレビュー描画
            drawPreview();
        }

        function drawBlock(context, x, y, color) {
            const px = x * BLOCK_SIZE;
            const py = y * BLOCK_SIZE;

            // 基本のブロック
            context.fillStyle = color;
            context.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);

            // ハイライト
            context.fillStyle = 'rgba(255, 255, 255, 0.4)';
            context.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, 6);
            context.fillRect(px + 1, py + 1, 6, BLOCK_SIZE - 2);

            // シャドウ
            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
            context.fillRect(px + BLOCK_SIZE - 7, py + 1, 6, BLOCK_SIZE - 2);
            context.fillRect(px + 1, py + BLOCK_SIZE - 7, BLOCK_SIZE - 2, 6);

            // 枠線
            context.strokeStyle = 'rgba(0, 0, 0, 0.5)';
            context.lineWidth = 2;
            context.strokeRect(px + 2, py + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
        }

        function drawPreview() {
            nextCtx.fillStyle = '#0a0a15';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (!nextPieceType) return;

            const piece = PIECES[nextPieceType];
            const blockSize = 25;
            const offsetX = (nextCanvas.width - piece.shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - piece.shape.length * blockSize) / 2;

            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const px = offsetX + x * blockSize;
                        const py = offsetY + y * blockSize;

                        nextCtx.fillStyle = piece.color;
                        nextCtx.fillRect(px, py, blockSize - 1, blockSize - 1);

                        nextCtx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        nextCtx.fillRect(px, py, blockSize - 1, 4);
                        nextCtx.fillRect(px, py, 4, blockSize - 1);

                        nextCtx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                        nextCtx.lineWidth = 1;
                        nextCtx.strokeRect(px, py, blockSize - 1, blockSize - 1);
                    }
                }
            }
        }

        function updateDisplay() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('linesDisplay').textContent = lines;
        }

        // キー操作
        document.addEventListener('keydown', (e) => {
            if (gameOver || paused) return;

            switch(e.code) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    score += 1;
                    updateDisplay();
                    break;
                case 'ArrowUp':
                    rotate(currentPiece);
                    break;
                case 'Space':
                    hardDrop();
                    break;
                case 'KeyP':
                    togglePause();
                    break;
            }

            draw();
        });

        // ゲーム開始
        resetGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
